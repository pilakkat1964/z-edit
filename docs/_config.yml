# GitHub Pages Jekyll Configuration for z-edit
# Theme: jekyll-theme-architect

# Base URL for GitHub Pages deployment
baseurl: /z-edit

# Theme
theme: jekyll-theme-architect

# Site Information
title: Z-Edit
description: "Smart file editor launcher — opens files in the right editor based on MIME type or extension"
show_downloads: true

# GitHub Repository Information
github:
  repository_url: https://github.com/pilakkat1964/z-edit
  owner_name: pilakkat1964
  owner_url: https://github.com/pilakkat1964

# Plugins for GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-relative-links

# Markdown processor
markdown: kramdown

# Kramdown configuration
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalink style
permalink: /:title/

# Front matter defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Relative links plugin configuration
relative_links:
  collections: true

# Build settings
keep_files:
  - .git
  - .github

# Exclude unnecessary files
exclude:
  - Makefile
  - .gitignore
  - .github
  - README.md
  - DEVELOPMENT.md
