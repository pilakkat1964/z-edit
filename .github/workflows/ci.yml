name: CI

on:
  push:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "0.11.1"
      
      - name: Install dependencies
        run: |
          uv sync --all-extras
      
      - name: Lint with ruff (if installed)
        run: |
          if command -v ruff &> /dev/null; then
            uv run ruff check zedit.py || true
          fi
        continue-on-error: true
      
      - name: Run tests
        run: |
          uv run pytest -v tests/ || echo "No tests directory or tests failed"
        continue-on-error: true
      
      - name: Verify zedit runs
        run: |
          source .venv/bin/activate
          python zedit.py --version
          python zedit.py --help > /dev/null
      
      - name: Type checking (if applicable)
        run: |
          # Python type checking optional
          echo "Type checking skipped (manual review recommended)"
        continue-on-error: true

  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake python3-magic
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/zedit
      
      - name: Build source archive
        run: cmake --build build --target tarball
      
      - name: Verify build artifacts
        run: |
          ls -lh build/zedit-*.tar.gz
          tar -tzf build/zedit-*.tar.gz | head -20
      
      - name: Test installation
        run: |
          cd /tmp
          tar -xzf ${{ github.workspace }}/build/zedit-*.tar.gz
          ls -la zedit-*/
