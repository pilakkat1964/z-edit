name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      
      - name: Validate version format
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          echo "Version validated: $VERSION"

  build-source-package:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      source-archive: ${{ steps.build.outputs.source-archive }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build source archive
        id: build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git archive --format=tar.gz \
            --prefix="zedit-${VERSION}-source/" \
            -o "zedit-${VERSION}-source.tar.gz" \
            HEAD
          
          if [ ! -f "zedit-${VERSION}-source.tar.gz" ]; then
            echo "Source archive creation failed"
            exit 1
          fi
          
          echo "source-archive=zedit-${VERSION}-source.tar.gz" >> "$GITHUB_OUTPUT"
          ls -lh zedit-*.tar.gz

      - name: Upload source package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-package
          path: zedit-*.tar.gz
          retention-days: 7

  build-debian-multiarch:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      deb-package: ${{ steps.build.outputs.deb-package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake python3-magic dpkg-dev debhelper dh-python

      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/zedit -DZEDIT_BUILD_WHEEL=OFF

      - name: Build Debian package (multiarch)
        id: build
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cmake --build build --target deb
          
          DEB_FILE=$(ls build/zedit-*.deb | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "Debian package creation failed"
            exit 1
          fi
          
          # Verify Architecture: any in package
          ARCH=$(dpkg -I "$DEB_FILE" | grep "Architecture:" | awk '{print $2}')
          echo "Package architecture: $ARCH"
          if [ "$ARCH" != "any" ]; then
            echo "ERROR: Package architecture should be 'any', but got '$ARCH'"
            exit 1
          fi
          
          # Rename to indicate multiarch support
          DEB_RENAMED="${DEB_FILE%.*}-multiarch.deb"
          mv "$DEB_FILE" "$DEB_RENAMED"
          
          echo "deb-package=$(basename $DEB_RENAMED)" >> "$GITHUB_OUTPUT"
          ls -lh "$DEB_RENAMED"
          
          dpkg -I "$DEB_RENAMED"

      - name: Upload Debian multiarch package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-multiarch
          path: build/zedit-*-multiarch.deb
          retention-days: 7

  create-release:
    needs: [prepare, build-source-package, build-debian-multiarch]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source package
        uses: actions/download-artifact@v4
        with:
          name: source-package
          path: ./release-assets/

      - name: Download Debian multiarch package
        uses: actions/download-artifact@v4
        with:
          name: debian-multiarch
          path: ./release-assets/

      - name: Verify release assets
        run: |
          echo "Release assets:"
          ls -lh release-assets/
          echo ""
          echo "Asset count: $(ls release-assets/ | wc -l)"

      - name: Generate checksums
        run: |
          cd release-assets/
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zedit ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
